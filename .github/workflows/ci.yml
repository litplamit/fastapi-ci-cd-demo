name: FastAPI Automated Testing

# This tells the robot exactly WHEN to wake up
on:
  push:
    branches: [ "dev", "staging", "main" ]

jobs:
  test-the-code:
    # This spins up an empty Ubuntu Linux machine in the cloud somewhere
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Tell the robot to download your code from your branch
    - name: Download Code
      uses: actions/checkout@v4
      
    # Step 2: Install Python 3.11 on the empty Linux machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    # Step 3: Install all your requirements (including pytest)
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    # Step 4: Run the exact same test you just completed on your laptop!
    - name: Run Pytest
      run: |
        python -m pytest
      env:
        PROJECT_NAME: "GitHubTesting"
        MYSQL_USER: "ci_robot"
        MYSQL_PASSWORD: "fake_password"
        MYSQL_SERVER: "127.0.0.1"
        MYSQL_PORT: 3306
        MYSQL_DB: "fake_db"
  
    # --- PHASE 3: DOCKER BUILD & PUSH ---
    
    # Step 5: Log in to Docker Hub securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    # Step 6: Build the Image and Upload it!
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest
    
  # --- PHASE 4: AUTOMATED AWS DEPLOYMENT ---
    
    # Step 7: SSH into your AWS Server and run commands
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Install Docker on the empty server
          sudo apt-get update
          sudo apt-get install -y docker.io
          sudo systemctl start docker
          
          # 2. Download the brand new image from Docker Hub
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest
          
          # 3. Stop the old server (if one is running)
          sudo docker stop fastapi-server || true
          sudo docker rm fastapi-server || true
          
          # 4. Start the new server on Port 80 (standard internet traffic port)
          # We pass fake database passwords here so it doesn't crash on boot!
          sudo docker run -d --name fastapi-server -p 80:8000 \
            -e PROJECT_NAME="LiveAWS" \
            -e MYSQL_USER="dummy" \
            -e MYSQL_PASSWORD="dummy" \
            -e MYSQL_SERVER="127.0.0.1" \
            -e MYSQL_PORT=3306 \
            -e MYSQL_DB="dummy" \
            ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest


